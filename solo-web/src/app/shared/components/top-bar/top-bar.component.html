<header class="flex items-center justify-between flex-nowrap w-full px-4 h-14 bg-white border-b border-gray-200">
  <div class="flex items-center gap-2 flex-shrink-0">
    <div class="flex items-center justify-center w-8 h-8 rounded bg-blue-600 text-white">
      <img src="assets/icons/music-player.png" alt="Music Player" class="w-5 h-5">
    </div>
    <span class="font-medium text-xl text-gray-800">Solo</span>
  </div>

  <div class="flex-1 max-w-2xl mx-8">
    <mat-form-field appearance="outline" class="w-full">
      <mat-icon matPrefix class="text-gray-500">search</mat-icon>
      <input #searchInput matInput aria-label="Search" placeholder="Search for Music" (keyup.enter)="onSearch(searchInput.value)" />
      <button mat-icon-button matSuffix aria-label="Clear">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>
  </div>

  <div class="flex items-center gap-2">
    <button mat-icon-button aria-label="Help">
      <mat-icon>help_outline</mat-icon>
    </button>
    <button mat-icon-button aria-label="Settings">
      <mat-icon>settings</mat-icon>
    </button>
    <button mat-icon-button aria-label="Apps">
      <mat-icon>apps</mat-icon>
    </button>
    <button mat-icon-button aria-label="Account">
      <mat-icon class="text-blue-600">account_circle</mat-icon>
    </button>
  </div>
</header>
