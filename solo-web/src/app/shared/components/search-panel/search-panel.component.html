<section class="bg-white/80 backdrop-blur-md rounded-lg shadow-sm mx-4 mb-4">
  <h1 class="text-lg font-semibold mb-3 px-4 pt-4">Welcome to Music Player</h1>

  <mat-form-field appearance="outline" class="w-full px-4">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput aria-label="Search" placeholder="Search in Music Player" (keydown)="$event.stopPropagation()" (keyup.enter)="$event.preventDefault()" />
  </mat-form-field>

  <div class="mt-3 grid grid-cols-2 sm:grid-cols-4 gap-2 px-4 pb-4">
    <button mat-stroked-button class="justify-between" (click)="$event.stopPropagation()">
      Genre
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <button mat-stroked-button class="justify-between" (click)="$event.stopPropagation()">
      Singer
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <button mat-stroked-button class="justify-between" (click)="$event.stopPropagation()">
      Movie
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <button mat-stroked-button class="justify-between" (click)="$event.stopPropagation()">
      Composer
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
  </div>
</section>
